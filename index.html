<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Subfinder Tool</title>
  <link rel="stylesheet" href="projectstyle.css">
</head>
<body>

<div class="container">
  <h1>Subfinder Simulator</h1>
  <p class="subtitle">Educational Use Only</p>

  <!-- Input -->
  <div class="input-box">
    <input type="text" id="domain" placeholder="Enter domain (e.g. example.com)">
    <button onclick="startScan()">Start Scan</button>
  </div>

  <!-- Progress -->
  <div class="progress-bar">
    <div id="progress"></div>
  </div>

  <!-- Output -->
  <div class="output-box">
    <h3>Discovered Subdomains</h3>
    <div id="output"></div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
